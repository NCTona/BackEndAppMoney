spring.application.name=expensestracker
spring.datasource.url=jdbc:mysql://localhost:3306/expensestracker?useSSL=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties..hibernate.dialect = org.hibernate.dialect.MySQLDialect
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
logging.level.org.springframework.data.jpa.repository.config=DEBUG
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
prefix=api

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

jwt.secretKey=${JWT_SECRET}
jwt.expiration=150000
jwt.refresh-expiration=1296000000

server.port=8080
server.ssl.key-store=classpath:expense-tracker.p12
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=expensetracker

app.security.db-encryption-key=${DB_ENCRYPTION_KEY}
app.security.db-encryption-iv=${DB_ENCRYPTION_IV}

app.security.login.max-attempts=5
app.security.login.lock-duration-minutes=15

app.rate-limit.capacity=10
app.rate-limit.refill-tokens=10
app.rate-limit.refill-duration-minutes=1
